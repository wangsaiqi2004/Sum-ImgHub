services:
  sum-image:
    build:
      context: .
    container_name: sum-image
    restart: unless-stopped
    ports:
      - "${SUM_IMAGE_HOST_PORT:-3010}:8877"
    environment:
      PORT: 8877
      PUBLIC_REFERENCE_BASE_URL: ${PUBLIC_REFERENCE_BASE_URL:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-admin123456}
    volumes:
      - ./.data:/app/.data
